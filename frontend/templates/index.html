<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>🤖 Support Assistant</h1>
            <!-- ✅ PAS DE LIEN ADMIN - Discret -->
        </header>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <strong>Bot</strong>
                Bonjour ! Je suis votre assistant support. Comment puis-je vous aider aujourd'hui ?
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="file-upload-area" id="fileUploadArea" style="display: none;">
                <div class="file-preview" id="filePreview">
                    <span id="fileName"></span>
                    <span class="remove-file" onclick="removeFile()">✕</span>
                </div>
            </div>
            
            <div class="input-row">
                <label for="fileInput" class="file-upload-label">
                    📎 Joindre un fichier
                </label>
                <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.gif,.txt,.pdf,.log">
                
                <input type="text" id="userInput" placeholder="Tapez votre message...">
                <button onclick="sendMessage()" id="sendBtn">Envoyer</button>
            </div>
        </div>
    </div>
    
    <!-- Socket.IO pour les notifications temps réel -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
